# Application
spring.application.name=DiscoveryBot

# Telegram Bot
telegram.bot.token=${TELEGRAM_BOT_TOKEN}
telegram.bot.username=${TELEGRAM_BOT_USERNAME}

# Spring AI → OpenRouter (OpenAI-compatible)
spring.ai.openai.api-key=${OPENROUTER_API_KEY:}
spring.ai.openai.base-url=https://openrouter.ai/api
spring.ai.openai.chat.options.model=${OPENROUTER_MODEL:openai/gpt-4o-mini}
spring.ai.openai.embedding.enabled=false
spring.ai.openai.image.enabled=false

# Google Places API
google.places.api.key=${GOOGLE_PLACES_API_KEY}

# YouTube Data API
youtube.api.key=${YOUTUBE_API_KEY}

# Embedding API (OpenRouter-compatible, via WebClient)
openrouter.base-url=https://openrouter.ai/api
openrouter.embedding.model=${OPENROUTER_EMBEDDING_MODEL:openai/text-embedding-3-small}

# PostgreSQL
spring.datasource.url=${DB_URL}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
